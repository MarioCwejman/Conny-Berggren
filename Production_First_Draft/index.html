<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Conny Berggren | CBU Management</title>
    <meta
      name="description"
      content="Kort beskrivning av innehåll, erbjudande och kontaktuppgifter skrivs här 01."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <div class="header-brand-group">
        <a class="brand" href="#top" aria-label="Till startsidan">
          <span class="brand-logo-wrap">
            <img
              class="brand-logo"
              src="assets/cbu-logotyp.png"
              width="320"
              height="182"
              alt="CBU Management"
            />
          </span>
          <span class="brand-text">
            <strong data-brand-primary>Conny Berggren</strong>
            <small data-brand-supporting>CBU Management</small>
          </span>
        </a>
        <a
          class="brand-affiliation"
          href="#erfarenhet"
          aria-label="Till erfarenhet och medlemskap"
        >
          <img
            class="brand-affiliation-logo"
            src="assets/sbrlogorgb.png"
            width="540"
            height="213"
            alt="SBR Byggingenj&ouml;rerna"
          />
        </a>
      </div>

      <nav class="site-nav" aria-label="Huvudmeny">
        <a href="#kompetenser">Kompetenser</a>
        <a href="#erfarenhet">Erfarenhet</a>
        <a href="#kontakt">Kontakt</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-backdrop" aria-hidden="true"></div>
        <nav class="hero-puzzle-map" aria-label="Kompetenser i pusslet" data-puzzle-map>
          <img
            class="hero-puzzle-image"
            src="assets/hero-banner.svg"
            width="1280"
            height="1280"
            alt=""
          />
          <div data-puzzle-labels></div>
          <div class="hero-brand-on-piece" aria-hidden="true">
            <div class="hero-logo-heading">
              <img
                class="hero-logo-image"
                src="assets/cbu-logotyp.png"
                width="320"
                height="182"
                alt=""
              />
            </div>
          </div>
        </nav>

        <div class="hero-content">
          <p class="eyebrow" data-hero-eyebrow></p>
          <h1 id="hero-title" class="hero-title" data-hero-title></h1>
          <p class="hero-lede" data-hero-lede></p>
          <p class="hero-line" data-hero-line></p>
          <div class="hero-actions" aria-label="Snabba kontaktv&auml;gar">
            <a class="button primary phone-cta-mobile" data-phone-link href="#">Ring h&auml;r</a>
            <button
              class="button primary phone-cta-desktop"
              type="button"
              data-phone-trigger
              data-phone-number=""
              aria-label="Visa telefonnummer till Conny Berggren"
            >
              Ring h&auml;r
            </button>
            <a class="button primary" data-email-link href="#">Mejla h&auml;r</a>
            <a
              class="button secondary"
              data-linkedin-link
              href="#"
              target="_blank"
              rel="noopener"
            >
              LinkedIn
            </a>
          </div>
        </div>

        <aside class="profile-panel" aria-label="Profil">
          <div class="profile-media">
            <div class="portrait">
              <img
                data-profile-image
                src="assets/conny-berggren.png"
                width="160"
                height="220"
                alt="Portr&auml;ttfoto av Conny Berggren"
              />
            </div>
            <a
              class="profile-cv-link"
              data-cv-link
              href="assets/cv-conny-berggren-2026-03-30.pdf"
              target="_blank"
              rel="noopener"
            >
              CV PDF
            </a>
          </div>
          <div>
            <p class="profile-name" data-profile-name></p>
            <p data-profile-summary></p>
          </div>
        </aside>
      </section>

      <section
        class="credential-strip"
        id="erfarenhet"
        aria-label="Erfarenhet, förtroende och medlemskap"
      >
        <p class="credential-kicker" data-credentials-kicker></p>
        <div class="credential-track" data-credentials-list></div>
      </section>

      <section class="specialties" id="kompetenser" aria-labelledby="specialties-title">
        <div class="section-heading">
          <div class="section-kicker" data-specialties-kicker></div>
          <h2 id="specialties-title" data-specialties-title></h2>
          <p class="section-intro" data-specialties-intro></p>
        </div>

        <div class="specialty-grid" data-specialties-list></div>
      </section>

      <section class="service-band" aria-label="Uppdrag">
        <div>
          <h2 data-service-band-title></h2>
          <p data-service-band-body></p>
        </div>
        <a class="text-link phone-cta-mobile" data-phone-link href="#">Ring h&auml;r</a>
        <button
          class="text-link phone-cta-desktop"
          type="button"
          data-phone-trigger
          data-phone-number=""
          aria-label="Visa telefonnummer till Conny Berggren"
        >
          Ring h&auml;r
        </button>
      </section>

      <section class="quote-section" aria-labelledby="quote-title">
        <h2 id="quote-title" data-quote-title></h2>
        <p data-quote-body></p>
      </section>
    </main>

    <footer class="site-footer" id="kontakt">
      <div>
        <p class="footer-brand" data-footer-brand></p>
        <p data-footer-summary></p>
      </div>

      <address>
        <a data-phone-link data-phone-text href="#"></a>
        <span class="postal-address" data-address></span>
        <a data-linkedin-link href="#" target="_blank" rel="noopener">LinkedIn</a>
        <a data-email-link data-email-text href="#"></a>
      </address>

      <div class="company-meta">
        <span data-company-name></span>
        <span data-company-number></span>
        <span data-vat-number></span>
      </div>
    </footer>

    <div class="phone-popup" data-phone-popup hidden>
      <div class="phone-popup-backdrop" data-phone-popup-close></div>
      <div
        class="phone-popup-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="phone-popup-title"
        aria-describedby="phone-popup-description"
      >
        <button
          class="phone-popup-close"
          type="button"
          data-phone-popup-close
          aria-label="St&auml;ng popup"
        >
          St&auml;ng
        </button>
        <p class="phone-popup-kicker">Telefon</p>
        <h2 class="phone-popup-title" id="phone-popup-title">Ring Conny Berggren</h2>
        <p class="phone-popup-description" id="phone-popup-description">
          Telefonnumret visas h&auml;r s&aring; att du enkelt kan sl&aring; det manuellt eller
          kopiera det.
        </p>
        <p class="phone-popup-number" data-phone-popup-number></p>
        <div class="phone-popup-actions">
          <button class="button primary" type="button" data-phone-popup-copy>
            Kopiera nummer
          </button>
          <button class="button secondary phone-popup-dismiss" type="button" data-phone-popup-close>
            St&auml;ng
          </button>
        </div>
        <p class="phone-popup-status" data-phone-popup-status aria-live="polite"></p>
      </div>
    </div>

    <div class="specialty-popup" data-specialty-popup hidden>
      <div class="specialty-popup-backdrop" data-specialty-popup-close></div>
      <div
        class="specialty-popup-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="specialty-popup-title"
        aria-describedby="specialty-popup-body"
      >
        <button
          class="specialty-popup-close"
          type="button"
          data-specialty-popup-close
          data-specialty-popup-focus
          aria-label="St&auml;ng popup"
        >
          St&auml;ng
        </button>
        <p class="specialty-popup-kicker">Kompetens</p>
        <p class="specialty-popup-index" data-specialty-popup-index></p>
        <h2
          class="specialty-popup-title"
          id="specialty-popup-title"
          data-specialty-popup-title
        ></h2>
        <div class="specialty-popup-body" id="specialty-popup-body" data-specialty-popup-body></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
